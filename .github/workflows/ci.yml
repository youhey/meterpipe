name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: meterpipe
          MYSQL_USER: meterpipe
          MYSQL_PASSWORD: meterpipe
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: intl, pdo_mysql, redis, zip
          tools: composer:v2

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Composer validate
        working-directory: src
        run: composer validate --strict

      - name: Composer install
        working-directory: src
        run: composer install --no-interaction --prefer-dist

      - name: Composer audit
        working-directory: src
        run: composer audit --ignore-unreachable

      - name: Prepare Laravel
        working-directory: src
        run: |
          cp .env.example .env
          php artisan key:generate --ansi

      - name: Migration test with MySQL
        working-directory: src
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: meterpipe
          DB_USERNAME: meterpipe
          DB_PASSWORD: meterpipe
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
        run: php artisan migrate:fresh --seed --force

      - name: PHPUnit
        working-directory: src
        run: php artisan test

      - name: PHPStan
        working-directory: src
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
        run: vendor/bin/phpstan analyse --memory-limit=1G

      - name: PHP-CS-Fixer dry run
        working-directory: src
        run: vendor/bin/php-cs-fixer fix --dry-run --diff --sequential

      - name: Frontend build
        working-directory: src
        run: |
          npm install
          npm run build
