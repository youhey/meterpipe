services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - php-fpm
    ports:
      - "${METERPIPE_WEB_PORT:-8084}:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  php-fpm:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      valkey:
        condition: service_started

  php-cli:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      valkey:
        condition: service_started
    entrypoint: ["php"]

  node:
    image: node:24-alpine
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    ports:
      - "${METERPIPE_VITE_PORT:-5174}:5174"
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5174"]

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: "${MYSQL_DATABASE:-meterpipe}"
      MYSQL_USER: "${MYSQL_USER:-meterpipe}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:-meterpipe}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-root}"
    ports:
      - "${METERPIPE_DB_PORT:-33064}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 20

  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "${METERPIPE_REDIS_PORT:-63794}:6379"
    volumes:
      - valkey-data:/data

volumes:
  mysql-data:
  valkey-data:
